<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment – La Vie Nail Lounge</title>
    <link rel="stylesheet" href="css/style.css" />
    <meta
      name="description"
      content="Schedule your next appointment with La Vie Nail Lounge. Choose your location, service and preferred date & time."
    />
    <style>
      /* Styles specific to the booking form */
      .schedule {
        padding: 4rem 2rem;
        background-color: var(--blush);
        max-width: 700px;
        margin: 0 auto;
      }
      .schedule h2 {
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 2rem;
        color: var(--charcoal);
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      label {
        font-weight: 600;
        color: var(--charcoal);
      }
      input,
      select {
        padding: 0.6rem 0.8rem;
        border: 1px solid #e0d0d0;
        border-radius: 0.3rem;
        font-size: 1rem;
        background-color: var(--white);
        color: var(--charcoal);
      }
      .confirmation {
        background-color: var(--soft-pink);
        border-radius: 0.5rem;
        padding: 1rem;
        text-align: center;
        font-weight: 600;
        color: var(--charcoal);
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">La Vie Nail Lounge</div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="locations.html">Locations</a></li>
          <li><a href="promotions.html">Promotions</a></li>
          <li><a href="payment.html">Payment</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="team.html">Team</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <a href="#" class="btn btn-primary" data-book="general">Book Now</a>
    </header>
    <section class="schedule">
      <h2>Book Your Appointment</h2>
      <form id="bookingForm">
        <div>
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required />
        </div>
        <div>
          <label for="location">Preferred Location</label>
          <select id="location" name="location" required>
            <option value="Fleetwood">Fleetwood</option>
            <option value="Newton">Newton</option>
            <option value="Langley">Langley</option>
          </select>
        </div>
        <div>
          <label for="staff">Preferred Technician</label>
          <select id="staff" name="staff" required>
            <option value="Julie">Julie</option>
            <option value="Tony">Tony</option>
            <option value="Vivian">Vivian</option>
            <option value="Emma">Emma</option>
          </select>
        </div>
        <div>
          <label for="service">Service</label>
          <select id="service" name="service" required>
            <option value="Gel‑X Extensions">Gel‑X Extensions</option>
            <option value="Acrylic & Extensions">Acrylic & Nail Extensions</option>
            <option value="Luxury Pedicure">Luxury Pedicures</option>
            <option value="Nail Art">Nail Art & Design</option>
            <option value="Lash Extensions">Lash Extensions</option>
          </select>
        </div>
        <div>
          <label for="date">Date</label>
          <input type="date" id="date" name="date" required />
        </div>
        <div>
          <label for="time">Time</label>
          <input type="time" id="time" name="time" required />
        </div>
        <button type="submit" class="btn btn-primary">Submit Booking</button>
      </form>
      <div id="bookingConfirmation" class="confirmation" style="display: none;">
        Thank you for booking! We’ll reach out to confirm your appointment shortly.
      </div>
    </section>
    <footer>
      <p>© <span id="year"></span> La Vie Nail Lounge. All rights reserved.</p>
    </footer>
    <script src="js/interactions.js"></script>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
      // Preselect options based on query parameters passed from booking buttons
      (function () {
        const params = new URLSearchParams(window.location.search);
        const staffParam = params.get('staff');
        const serviceParam = params.get('service');
        const locationParam = params.get('location');
        if (staffParam) {
          const staffSelect = document.getElementById('staff');
          if (staffSelect) staffSelect.value = staffParam;
        }
        if (serviceParam) {
          const serviceSelect = document.getElementById('service');
          if (serviceSelect) serviceSelect.value = serviceParam;
        }
        if (locationParam) {
          const locationSelect = document.getElementById('location');
          if (locationSelect) locationSelect.value = locationParam;
        }
      })();
      document.getElementById('bookingForm').addEventListener('submit', function (e) {
        e.preventDefault();
        document.getElementById('bookingConfirmation').style.display = 'block';
        // Clear form fields after submission
        this.reset();
      });
    </script>
  </body>
</html>
